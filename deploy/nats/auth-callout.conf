# deploy/nats/auth-callout.conf — the nats-server AUTH-CALLOUT configuration for the
# bring-your-own-compute tenancy boundary (M-AUTH; dossier §10.1 NATS Accounts per
# workspace + §17 the isolation smoke). This is the SNIPPET the ops-repo infra batch
# folds into the platform NATS StatefulSet config (the official NATS chart's
# `config.merge` / a mounted conf). It is documented + version-controlled here as the
# single source of truth; it is NOT applied ad-hoc (dossier §25 — IaC only).
#
# ── HOW IT WORKS ──────────────────────────────────────────────────────────────────
# When an external agent connects presenting its `oge_` enrollment bearer as the
# connect AUTH-TOKEN, nats-server issues an authorization request on
# `$SYS.REQ.USER.AUTH` to the OpenGeni control plane's callout RESPONDER (the
# `startAuthCalloutResponder` service in apps/api). The responder validates the bearer
# (HMAC) + confirms the enrollment is active, then returns a SIGNED user JWT scoping
# the connection to pub/sub ONLY `agent.<workspaceId>.>` (+ `_INBOX.>`). That signed
# subject scope IS the per-workspace isolation: workspace A's agent is
# cryptographically incapable of pub/sub on `agent.B.>` (the server enforces the JWT
# permissions).
#
# ── THE LOAD-BEARING RULE (verified against nats-server 2.10.x) ────────────────────
# Every user in the callout `account` that is NOT listed in `auth_users` is DELEGATED
# to the callout responder. The users listed in `auth_users` authenticate DIRECTLY (by
# password) and BYPASS the callout. Therefore:
#   * `auth`    — the RESPONDER's own login. MUST be in auth_users (else the responder
#                 connecting would itself be delegated → infinite loop).
#   * `control` — the PRIVILEGED control-plane login (api/worker). MUST ALSO be in
#                 auth_users so it authenticates directly with full account-default
#                 permissions (it presents no enrollment bearer). It may then
#                 request `agent.*.rpc` + receive its inbox replies.
#   * AGENTS    — NOT in auth_users → delegated to the callout. The responder mints a
#                 user JWT whose `aud` is the account NAME `APP` (server-config-mode
#                 placement) and whose pub/sub allow-list is `agent.<ws>.>` + `_INBOX.>`.
# All three live in the SAME account (APP) so `agent.<ws>.<id>.rpc` request/reply
# routes between the control plane and the agents; the workspace isolation is carried
# ENTIRELY by each agent's signed subject permissions, NOT by cross-account placement
# (server-config-mode nats-server does not support cross-account callout placement —
# nats-io/nats-server#4335).
#
# ── PLACEHOLDERS the infra batch substitutes from secrets (see §SECRETS below) ─────
#   __CALLOUT_ISSUER_PUBLIC_KEY__   the callout account PUBLIC nkey (`A...`); the
#                                   PUBLIC half of OPENGENI_SELFHOSTED_NATS_CALLOUT_ACCOUNT_SEED.
#   __CONTROL_PLANE_PASSWORD__      the control-plane password
#                                   (= OPENGENI_SELFHOSTED_NATS_CONTROL_PASSWORD).
#   __CALLOUT_RESPONDER_PASSWORD__  the responder's password
#                                   (= OPENGENI_SELFHOSTED_NATS_CALLOUT_PASSWORD).
# (Passwords SHOULD be bcrypt hashes in production — `nats server passwd` — not the
# plaintext shown by the dev/test fixtures; the placeholder accepts either.)

# The websocket listener (the agent dials `wss://` so the control-plane NATS endpoint
# rides the SAME TLS ingress as the stream relay — no separate public TCP LB). In
# cluster the TLS is terminated at the ingress; nats-server's own ws block may run
# no_tls behind that ingress, or terminate TLS itself with the mounted cert. The
# infra batch wires the ingress host (e.g. nats.opengeni.ai) to this ws port.
websocket {
  port: 8443
  # In-cluster: TLS terminated at the ingress in front of this listener. If
  # nats-server terminates TLS itself instead, set:
  #   tls { cert_file: "/etc/nats-certs/tls.crt", key_file: "/etc/nats-certs/tls.key" }
  no_tls: true
  # Allow the relay-symmetric ingress origin(s). Tighten to the real host in prod.
  same_origin: false
}

accounts {
  # The ONE shared application account: the control plane (control), the callout
  # responder (auth), and every enrolled agent (placed here by the callout) all live
  # in APP so subjects route. Per-workspace isolation is the agents' signed JWT
  # subject permissions.
  APP: {
    users: [
      # The control plane (api/worker) — privileged, authenticates directly (in
      # auth_users below), gets account-default (full) permissions so it may request
      # agent.*.rpc and receive inbox replies.
      { user: control, password: "__CONTROL_PLANE_PASSWORD__" }
      # The callout responder's own login — authenticates directly (in auth_users).
      { user: auth, password: "__CALLOUT_RESPONDER_PASSWORD__" }
    ]
  }
  # The system account (monitoring/advisories). Keep operationally separate.
  SYS: {}
}
system_account: SYS

authorization {
  auth_callout {
    # The callout issuer = the callout account PUBLIC nkey. Its corresponding SEED
    # (OPENGENI_SELFHOSTED_NATS_CALLOUT_ACCOUNT_SEED) signs every user + response JWT.
    issuer: __CALLOUT_ISSUER_PUBLIC_KEY__
    # The users that authenticate DIRECTLY (bypass the callout): the responder + the
    # privileged control plane. EVERY OTHER connection into APP is delegated to the
    # callout — i.e. the agents, who must present a valid enrollment bearer.
    auth_users: [ auth, control ]
    # The account delegated connections are placed into (the agents land in APP).
    account: APP
    # No xkey: the request is not encrypted to the responder. The bearer is already an
    # HMAC-authenticated identity claim and the wire is TLS (the ws ingress), so xkey
    # encryption is an optional ADR-26 hardening we deliberately omit for simplicity.
    # To enable it later: add `xkey: <server-xkey-public>` here and decrypt in the
    # responder.
  }
}

# ── SECRETS the infra batch must provision (opengeni-runtime secret + the NATS conf) ─
# These live in the opengeni-runtime Kubernetes secret (the Helm-clobbered configmap is
# avoided per memory `opengeni-deploy-pipeline-and-provider-config`), wired through the
# deploy-staging.yml secret-patch pattern. NEVER commit the values.
#
#   OPENGENI_SANDBOX_SELFHOSTED_ENABLED=true
#       Gates the whole feature; the responder only starts when this is on.
#
#   OPENGENI_ENROLLMENT_SIGNING_SECRET=<hmac secret>
#       The HMAC secret the control plane signs the `oge_` enrollment bearer with and
#       the responder verifies it with. (Falls back to OPENGENI_DELEGATION_SECRET.)
#
#   OPENGENI_SELFHOSTED_NATS_CALLOUT_ACCOUNT_SEED=SA...    (the callout account SEED)
#       Signs the user + authorization-response JWTs. Its PUBLIC key (`A...`) is the
#       `issuer` above. Generate with:  nats account add … OR nk -gen account.
#       (In this repo: `nkeys.createAccount()` → getSeed()/getPublicKey().)
#
#   OPENGENI_SELFHOSTED_NATS_CALLOUT_ACCOUNT_NAME=APP      (matches `account: APP`)
#       The account NAME the responder writes as the minted user JWT `aud` (placement).
#
#   OPENGENI_SELFHOSTED_NATS_CALLOUT_USER=auth
#   OPENGENI_SELFHOSTED_NATS_CALLOUT_PASSWORD=<responder password>
#       The responder's login (an auth_users user). Matches `{ user: auth, … }`.
#
#   OPENGENI_SELFHOSTED_NATS_CONTROL_USER=control
#   OPENGENI_SELFHOSTED_NATS_CONTROL_PASSWORD=<control-plane password>
#       The privileged control-plane login (api/worker). Matches `{ user: control, … }`.
#
#   OPENGENI_SELFHOSTED_NATS_URL=wss://nats.opengeni.ai          (handed to agents)
#       The wss endpoint the agent dials (the EnrollmentCredentials.natsUrls). The
#       api/worker still reach NATS in-cluster via OPENGENI_NATS_URL (nats://… svc).
#
# The control-plane connection (api/worker → the event bus + NatsControlRpc) uses
# OPENGENI_SELFHOSTED_NATS_CONTROL_USER/PASSWORD against the in-cluster OPENGENI_NATS_URL;
# the agents use the bearer-as-token against OPENGENI_SELFHOSTED_NATS_URL (wss). The
# callout responder uses OPENGENI_SELFHOSTED_NATS_CALLOUT_USER/PASSWORD against the
# in-cluster OPENGENI_NATS_URL.
