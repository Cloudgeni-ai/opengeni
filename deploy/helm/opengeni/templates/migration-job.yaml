{{- if and .Values.migrations.enabled .Values.api.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "opengeni.fullname" . }}-migrate
  labels:
    {{- include "opengeni.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    {{- toYaml .Values.migrations.annotations | nindent 4 }}
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "opengeni.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "opengeni.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "opengeni.image" (dict "root" . "image" .Values.migrations.image) | quote }}
          imagePullPolicy: {{ .Values.migrations.image.pullPolicy }}
          command:
            {{- toYaml .Values.migrations.command | nindent 12 }}
          envFrom:
            - secretRef:
                name: {{ include "opengeni.migrationSecretName" . }}
            - configMapRef:
                name: {{ include "opengeni.fullname" . }}-config
          # A pre-upgrade hook runs before Helm updates ordinary release
          # resources, so envFrom can still expose the previous ConfigMap.
          # Pin the new release's policy directly; explicit env wins over
          # envFrom and keeps migration/API policy provenance aligned.
          env:
            - name: OPENGENI_MAX_NESTED_AGENT_DEPTH
              value: {{ index .Values.config "OPENGENI_MAX_NESTED_AGENT_DEPTH" | quote }}
          {{- if or .Values.postgres.enabled .Values.temporal.enabled .Values.minio.enabled }}
            {{- include "opengeni.generatedRuntimeEnv" . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
{{- end }}
