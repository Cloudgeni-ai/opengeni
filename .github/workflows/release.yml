name: Release

# On every push to main, the changesets action opens/updates a "Version
# Packages" PR collecting the pending changesets. When that PR is merged (the
# package.json versions + CHANGELOGs land on main), the same action runs the
# publish step and pushes the publishable @opengeni/* closure to npm.
#
# This workflow is deliberately npm/version-only. Runtime image and Helm chart
# publication belongs exclusively to the SHA/digest-fenced out-of-band release
# operator in opengeni-ops. Keeping a second publisher here would permit partial
# public artifact sets after a cancellation or sequential push failure.
#
# REQUIRED REPO/ORG SETUP. This workflow is DORMANT until activated, so it does
# not run — or red-fail — on pushes to main until you opt in:
#   1. Set the repo variable RELEASE_ENABLED=true to activate the pipeline
#      (Settings -> Secrets and variables -> Actions -> Variables).
#   2. Claim the @opengeni npm org and set the NPM_TOKEN secret to an
#      automation/granular token with publish rights (provenance via OIDC).
#   3. Let the Version PR be opened: EITHER enable Settings -> Actions -> General
#      -> "Allow GitHub Actions to create and approve pull requests", OR set a
#      RELEASE_PAT secret (a PAT with repo + pull-requests scope) — this workflow
#      prefers RELEASE_PAT over the default GITHUB_TOKEN for exactly that reason.
#   4. Runtime images and the Helm chart are not published by this workflow.

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Version or publish packages
    runs-on: ubuntu-latest
    # Dormant until opted in: skips cleanly (no red) on pushes to main until the
    # repo variable RELEASE_ENABLED is set to 'true'. See the header for setup.
    if: ${{ vars.RELEASE_ENABLED == 'true' }}
    permissions:
      id-token: write # npm provenance (OIDC)
      contents: write # changesets opens the Version PR / pushes tags
      pull-requests: write # changesets opens/updates the Version PR
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ---- Release gate: nothing publishes unless these are green. ----
      - name: Typecheck
        run: bun run typecheck

      - name: Build publishable packages
        run: bun run build:packages

      - name: SDK contract-parity test
        run: cd packages/sdk && bun test test/contract-parity.test.ts

      - name: Publish closure guard
        run: bun scripts/publish-closure-guard.ts

      # ---- Version PR (normal push) or publish (Version PR merge). ----
      # Publishing uses npm (not bun) because bun publish cannot emit npm
      # provenance. The publish command is guarded so a missing NPM_TOKEN does
      # not fail the run — changesets only publishes on the Version PR merge.
      - name: Set up Node for npm publish
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Create Version PR or publish
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: bun run changeset:version
          publish: bun run release:publish
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          # Prefer a PAT (repo + pull-requests scope) so the Version PR can be
          # opened even if the org keeps "Actions may create PRs" disabled;
          # falls back to the default token when the org setting is enabled.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
