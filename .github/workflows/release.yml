name: Release

# A push to main may open/update the changesets Version PR, but it can NEVER
# publish. Publication is a separate, explicit workflow_dispatch after the
# exact source revision has passed staging, production, and the production
# canary window described in docs/workbench-acceptance.md. The dispatch is bound
# to the selected git ref and records the retained acceptance evidence.
#
# Release images are built once by release-candidate.yml before staging. The
# final GHCR job only promotes the exact accepted manifests to release tags and
# writes the BOM; it never rebuilds image bytes after acceptance.
#
# REQUIRED REPO/ORG SETUP. This workflow is DORMANT until activated, so it does
# not run — or red-fail — on pushes to main until you opt in:
#   1. Set the repo variable RELEASE_ENABLED=true to activate the pipeline
#      (Settings -> Secrets and variables -> Actions -> Variables).
#   2. Claim the @opengeni npm org and set the NPM_TOKEN secret to an
#      automation/granular token with publish rights (provenance via OIDC).
#   3. Enable Settings -> Actions -> General -> "Allow GitHub Actions to create
#      and approve pull requests". The scoped per-run GITHUB_TOKEN deliberately
#      authors Version PRs as github-actions[bot], leaving exact-head approval to
#      a distinct trusted human reviewer.
#   4. Set the api, worker, web, relay, and sandbox GHCR container packages to
#      Public once in each package's settings. GitHub has no supported REST API
#      for changing package visibility; candidate publication and final
#      promotion both fail closed while any package remains private.
#   - GHCR image publishing needs no extra secret (built-in GITHUB_TOKEN) and
#     runs only when a release actually publishes.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      source_sha:
        description: Exact 40-character source SHA that passed acceptance; dispatch this workflow from that same ref.
        required: true
        type: string
      expected_packages:
        description: Exact comma-separated package set, for example @opengeni/react@0.15.0.
        required: true
        type: string
      candidate_run_id:
        description: Completed run ID of the canonical release-candidate workflow for source_sha.
        required: true
        type: string
      acceptance_run_id:
        description: Completed run ID of the protected canonical release-acceptance workflow for source_sha.
        required: true
        type: string
      confirm_zero_gaps:
        description: Confirm zero known defects, skipped checks, failed/late canary cycles, and unverified acceptance rows.
        required: true
        default: false
        type: boolean

concurrency:
  group: release-${{ github.event_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  version:
    name: Open or update Version PR
    runs-on: ubuntu-latest
    # Dormant until opted in: skips cleanly (no red) on pushes to main until the
    # repo variable RELEASE_ENABLED is set to 'true'. See the header for setup.
    if: ${{ github.event_name == 'push' && vars.RELEASE_ENABLED == 'true' }}
    permissions:
      contents: write # changesets commits package versions to its release branch
      pull-requests: write # changesets opens/updates the Version PR
      actions: write # dispatch trusted main CI for the token-authored Version PR
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ---- Version-PR gate. This job has no npm publication command. ----
      - name: Typecheck
        run: bun run typecheck

      - name: Build publishable packages
        run: bun run build:packages

      - name: SDK contract-parity test
        run: cd packages/sdk && bun test test/contract-parity.test.ts

      - name: Publish closure guard
        run: bun scripts/publish-closure-guard.ts

      - name: Runtime embedding consumer
        run: bun run test:runtime-embedding-consumer

      - name: Portable ogtool package
        run: bun run test:ogtool-package

      - name: Detect versionable changesets
        id: release_plan
        shell: bash
        run: |
          set -euo pipefail
          plan="$RUNNER_TEMP/changeset-status.json"
          bunx changeset status --output "$plan"
          changeset_count="$(jq -er '.changesets | length' "$plan")"
          release_count="$(jq -er '.releases | length' "$plan")"
          if [ "$changeset_count" -gt 0 ] && [ "$release_count" -eq 0 ]; then
            echo "::error::pending changesets target only ignored/private packages and cannot produce a Version PR"
            exit 1
          fi
          if [ "$release_count" -gt 0 ]; then
            echo "has_releases=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_releases=false" >> "$GITHUB_OUTPUT"
            echo "No publishable package changesets; a Version PR is not required."
          fi

      - name: Create or update Version PR
        id: changesets
        if: ${{ steps.release_plan.outputs.has_releases == 'true' }}
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          version: bun run changeset:version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          # Keep the automation author distinct from the trusted human reviewer.
          GITHUB_TOKEN: ${{ github.token }}

      # GITHUB_TOKEN-created pull requests intentionally do not recursively
      # trigger pull_request workflows. Dispatch the trusted CI definition from
      # main instead; its admission job binds candidate execution and checks to
      # the exact bot-authored head only after base-owned validation succeeds.
      - name: Dispatch exact-head Version PR CI
        if: ${{ steps.release_plan.outputs.has_releases == 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERSION_PR_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: node scripts/check-release-pr-automation.mjs dispatch-version-ci

  publish:
    name: Publish verified release
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && vars.RELEASE_ENABLED == 'true' }}
    permissions:
      id-token: write # npm provenance (OIDC)
      contents: write # changesets creates and pushes immutable package tags
      pull-requests: read # verify exact-head native approval before publication
      actions: read # resolve canonical producer runs and immutable artifact digests
    outputs:
      releaseReady: ${{ steps.registry.outputs.release_ready }}
      verifiedPackages: ${{ steps.registry.outputs.verified_packages }}
      bomPackages: ${{ steps.registry.outputs.bom_packages }}
      sourceSha: ${{ steps.preflight.outputs.source_sha }}
      candidateArtifactId: ${{ steps.preflight.outputs.candidate_artifact_id }}
      candidateArtifactDigest: ${{ steps.preflight.outputs.candidate_artifact_digest }}
      candidateArtifactUrl: ${{ steps.preflight.outputs.candidate_artifact_url }}
      candidateSourceTreeSha: ${{ steps.preflight.outputs.candidate_source_tree_sha }}
    steps:
      - name: Check out evidence-bound source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Bun for provenance verification
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Validate release identity and acceptance receipts
        id: preflight
        shell: bash
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
          ACCEPTANCE_RUN_ID: ${{ inputs.acceptance_run_id }}
          CONFIRM_ZERO_GAPS: ${{ inputs.confirm_zero_gaps }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          [[ "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "source_sha must be a 40-character lowercase git SHA" >&2
            exit 1
          }
          [ "$(git rev-parse HEAD)" = "$SOURCE_SHA" ] || {
            echo "checked-out source does not match source_sha" >&2
            exit 1
          }
          [ "$GITHUB_SHA" = "$SOURCE_SHA" ] || {
            echo "dispatch ref must resolve to source_sha; select the pinned release-candidate ref" >&2
            exit 1
          }
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$SOURCE_SHA" origin/main || {
            echo "source_sha must be reachable from origin/main" >&2
            exit 1
          }
          [ "$CONFIRM_ZERO_GAPS" = "true" ] || {
            echo "confirm_zero_gaps must be explicitly true" >&2
            exit 1
          }
          [[ "$CANDIDATE_RUN_ID" =~ ^[1-9][0-9]{0,19}$ ]] || {
            echo "candidate_run_id must be a positive workflow run ID" >&2
            exit 1
          }
          [[ "$ACCEPTANCE_RUN_ID" =~ ^[1-9][0-9]{0,19}$ ]] || {
            echo "acceptance_run_id must be a positive workflow run ID" >&2
            exit 1
          }
          if find .changeset -maxdepth 1 -type f -name '*.md' ! -name README.md -print -quit | grep -q .; then
            echo "pending changesets remain; merge the generated Version PR before release acceptance" >&2
            exit 1
          fi
          mkdir -p evidence
          bun scripts/verify-release-provenance.ts \
            --kind candidate \
            --source-sha "$SOURCE_SHA" \
            --run-id "$CANDIDATE_RUN_ID" \
            --output evidence/candidate-provenance.json \
            --output-prefix candidate
          bun scripts/verify-release-provenance.ts \
            --kind acceptance \
            --source-sha "$SOURCE_SHA" \
            --run-id "$ACCEPTANCE_RUN_ID" \
            --output evidence/acceptance-provenance.json \
            --output-prefix acceptance
          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"

      - name: Verify exact-head approval provenance
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ steps.preflight.outputs.source_sha }}
        run: node scripts/check-release-pr-automation.mjs verify-approved-merge

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download and validate the complete acceptance bundle
        env:
          SOURCE_SHA: ${{ steps.preflight.outputs.source_sha }}
          GITHUB_TOKEN: ${{ github.token }}
          CANDIDATE_ARTIFACT_ID: ${{ steps.preflight.outputs.candidate_artifact_id }}
          CANDIDATE_ARTIFACT_DIGEST: ${{ steps.preflight.outputs.candidate_artifact_digest }}
          CANDIDATE_ARTIFACT_URL: ${{ steps.preflight.outputs.candidate_artifact_url }}
          ACCEPTANCE_ARTIFACT_ID: ${{ steps.preflight.outputs.acceptance_artifact_id }}
          ACCEPTANCE_ARTIFACT_DIGEST: ${{ steps.preflight.outputs.acceptance_artifact_digest }}
          ACCEPTANCE_ARTIFACT_URL: ${{ steps.preflight.outputs.acceptance_artifact_url }}
          EXPECTED_PACKAGES: ${{ inputs.expected_packages }}
        run: |
          set -euo pipefail
          mkdir -p evidence .release/candidate-artifact .release/acceptance-artifact
          download_artifact() {
            local artifact_id="$1" digest="$2" destination="$3"
            local zip="$destination/artifact.zip"
            gh api \
              --header 'Accept: application/vnd.github+json' \
              --output "$zip" \
              "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip"
            printf '%s  %s\n' "${digest#sha256:}" "$zip" | sha256sum --check --strict -
            unzip -q "$zip" -d "$destination/files"
          }
          download_artifact "$CANDIDATE_ARTIFACT_ID" "$CANDIDATE_ARTIFACT_DIGEST" .release/candidate-artifact
          download_artifact "$ACCEPTANCE_ARTIFACT_ID" "$ACCEPTANCE_ARTIFACT_DIGEST" .release/acceptance-artifact
          cp .release/candidate-artifact/files/evidence/release-candidate.json evidence/release-candidate.json
          cp .release/candidate-artifact/files/evidence/release-candidate.sha256 evidence/release-candidate.sha256
          cp .release/candidate-artifact/files/evidence/release-chart.sha256 evidence/release-chart.sha256
          chart_artifact="$(jq -er '.chart.artifact' evidence/release-candidate.json)"
          chart_path="$(find .release/candidate-artifact/files -type f -name "$chart_artifact" -print -quit)"
          test -n "$chart_path"
          cp "$chart_path" ".release/$chart_artifact"
          receipt_sidecar="$(awk 'NF { print $1; exit }' evidence/release-candidate.sha256)"
          receipt_sha256="$(sha256sum evidence/release-candidate.json | awk '{print $1}')"
          [ "$receipt_sidecar" = "$receipt_sha256" ] || {
            echo "candidate receipt sidecar does not match the downloaded receipt" >&2
            exit 1
          }
          chart_sidecar="$(awk 'NF { print $1; exit }' evidence/release-chart.sha256)"
          chart_sha256="$(sha256sum ".release/$chart_artifact" | awk '{print $1}')"
          [ "$chart_sidecar" = "$chart_sha256" ] || {
            echo "candidate chart sidecar does not match the downloaded chart" >&2
            exit 1
          }
          expected_chart_sha256="$(jq -er '.chart.bytesSha256' evidence/release-candidate.json)"
          [ "$chart_sha256" = "$expected_chart_sha256" ] || {
            echo "candidate chart bytes do not match the receipt" >&2
            exit 1
          }
          cp .release/acceptance-artifact/files/evidence/workbench-acceptance.json evidence/workbench-acceptance.json
          acceptance_bundle_sha256="$(sha256sum evidence/workbench-acceptance.json | awk '{print $1}')"
          jq -e \
            --arg sourceSha "$SOURCE_SHA" \
            --arg sourceTreeSha "${{ steps.preflight.outputs.candidate_source_tree_sha }}" \
            --slurpfile producer evidence/candidate-provenance.json \
            '.sourceSha == $sourceSha and .sourceTreeSha == $sourceTreeSha and .producer == $producer[0].producer' \
            evidence/release-candidate.json >/dev/null
          bun scripts/release-candidate.ts \
            --verify evidence/release-candidate.json \
            --source-sha "$SOURCE_SHA" \
            --expected-packages "$EXPECTED_PACKAGES"
          bun scripts/verify-workbench-acceptance-bundle.ts \
            --bundle evidence/workbench-acceptance.json \
            --source-sha "$SOURCE_SHA" \
            --candidate-receipt evidence/release-candidate.json \
            --candidate-producer evidence/candidate-provenance.json \
            --acceptance-producer evidence/acceptance-provenance.json \
            --candidate-receipt-url "$CANDIDATE_ARTIFACT_URL" \
            --candidate-receipt-sha256 "$receipt_sha256"

      # Re-run deterministic package gates at the exact accepted source before
      # bytes leave the repository. Live acceptance is bound above.
      - name: Typecheck
        run: bun run typecheck

      - name: Build publishable packages
        run: bun run build:packages

      - name: SDK contract-parity test
        run: cd packages/sdk && bun test test/contract-parity.test.ts

      - name: Publish closure guard
        run: bun scripts/publish-closure-guard.ts

      - name: Runtime embedding consumer
        run: bun run test:runtime-embedding-consumer

      - name: Plan exact package publication
        id: package-plan
        env:
          OPENGENI_RELEASE_SOURCE_SHA: ${{ steps.preflight.outputs.source_sha }}
          OPENGENI_EXPECTED_PACKAGES: ${{ inputs.expected_packages }}
          OPENGENI_RELEASE_PACKAGE_PHASE: plan
          OPENGENI_RELEASE_PACKAGE_RECEIPT: evidence/release-packages-plan.json
        run: bun scripts/verify-release-packages.ts

      - name: Write pre-publication release plan
        env:
          SOURCE_SHA: ${{ steps.preflight.outputs.source_sha }}
          CANDIDATE_ARTIFACT_URL: ${{ steps.preflight.outputs.candidate_artifact_url }}
          CANDIDATE_ARTIFACT_ID: ${{ steps.preflight.outputs.candidate_artifact_id }}
          CANDIDATE_ARTIFACT_DIGEST: ${{ steps.preflight.outputs.candidate_artifact_digest }}
          ACCEPTANCE_ARTIFACT_URL: ${{ steps.preflight.outputs.acceptance_artifact_url }}
          ACCEPTANCE_ARTIFACT_ID: ${{ steps.preflight.outputs.acceptance_artifact_id }}
          ACCEPTANCE_ARTIFACT_DIGEST: ${{ steps.preflight.outputs.acceptance_artifact_digest }}
        run: |
          set -euo pipefail
          candidate_receipt_sha256="$(sha256sum evidence/release-candidate.json | awk '{print $1}')"
          acceptance_bundle_sha256="$(sha256sum evidence/workbench-acceptance.json | awk '{print $1}')"
          jq -n \
            --arg sourceSha "$SOURCE_SHA" \
            --arg candidateArtifactUrl "$CANDIDATE_ARTIFACT_URL" \
            --arg candidateArtifactId "$CANDIDATE_ARTIFACT_ID" \
            --arg candidateArtifactDigest "$CANDIDATE_ARTIFACT_DIGEST" \
            --arg acceptanceArtifactUrl "$ACCEPTANCE_ARTIFACT_URL" \
            --arg acceptanceArtifactId "$ACCEPTANCE_ARTIFACT_ID" \
            --arg acceptanceArtifactDigest "$ACCEPTANCE_ARTIFACT_DIGEST" \
            --arg acceptanceBundleSha256 "$acceptance_bundle_sha256" \
            --arg candidateReceiptSha256 "$candidate_receipt_sha256" \
            --slurpfile packagePlan evidence/release-packages-plan.json \
            --slurpfile candidateProvenance evidence/candidate-provenance.json \
            --slurpfile acceptanceProvenance evidence/acceptance-provenance.json \
            --slurpfile candidateReceipt evidence/release-candidate.json \
            '{
              schemaVersion: 1,
              sourceSha: $sourceSha,
              provenance: {
                candidate: $candidateProvenance[0],
                acceptance: $acceptanceProvenance[0],
                candidateArtifactId: $candidateArtifactId,
                candidateArtifactDigest: $candidateArtifactDigest,
                candidateArtifactUrl: $candidateArtifactUrl,
                acceptanceArtifactId: $acceptanceArtifactId,
                acceptanceArtifactDigest: $acceptanceArtifactDigest,
                acceptanceArtifactUrl: $acceptanceArtifactUrl
              },
              evidence: {
                candidateReceiptSha256: $candidateReceiptSha256,
                acceptanceBundleSha256: $acceptanceBundleSha256
              },
              chart: $candidateReceipt[0].chart,
              packagePlan: $packagePlan[0]
            }' > evidence/verified-release-plan.json

      # Persist the intended destructive boundary before npm can be mutated. A
      # later dispatch can reconcile an interrupted publish by gitHead+integrity.
      - name: Upload pre-publication release plan
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: verified-release-plan-${{ steps.preflight.outputs.source_sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            evidence/verified-release-plan.json
            evidence/workbench-acceptance.json
            evidence/release-candidate.json
          if-no-files-found: error
          retention-days: 90

      - name: Set up Node for npm publish
        if: steps.package-plan.outputs.needs_publish == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish evidence-bound packages
        if: steps.package-plan.outputs.needs_publish == 'true'
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          version: bun run changeset:version
          publish: bun run release:publish
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Reconcile registry package identity
        id: registry
        env:
          OPENGENI_RELEASE_SOURCE_SHA: ${{ steps.preflight.outputs.source_sha }}
          OPENGENI_EXPECTED_PACKAGES: ${{ inputs.expected_packages }}
          OPENGENI_RELEASE_PACKAGE_PHASE: verify
          OPENGENI_RELEASE_PACKAGE_RECEIPT: evidence/release-packages-verified.json
        run: bun scripts/verify-release-packages.ts

      - name: Write verified release receipt
        env:
          VERIFIED_PACKAGES: ${{ steps.registry.outputs.verified_packages }}
          BOM_PACKAGES: ${{ steps.registry.outputs.bom_packages }}
          SOURCE_SHA: ${{ steps.preflight.outputs.source_sha }}
        run: |
          set -euo pipefail
          mkdir -p evidence
          jq -e 'type == "array" and length > 0 and all(.[]; .state == "published" and (.integrity | startswith("sha512-")))' \
            <<<"$VERIFIED_PACKAGES" >/dev/null
          jq -e 'type == "array" and length > 0 and all(.[]; .state == "published" and (.integrity | startswith("sha512-")))' \
            <<<"$BOM_PACKAGES" >/dev/null
          jq -n \
            --arg sourceSha "$SOURCE_SHA" \
            --argjson publishedPackages "$VERIFIED_PACKAGES" \
            --argjson bomPackages "$BOM_PACKAGES" \
            --slurpfile plan evidence/verified-release-plan.json \
            '{
              schemaVersion: 1,
              sourceSha: $sourceSha,
              provenance: $plan[0].provenance,
              chart: $plan[0].chart,
              publishedPackages: $publishedPackages,
              bomPackages: $bomPackages
            }' > evidence/verified-release.json

      - name: Upload verified release receipt
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: verified-release-receipt-${{ steps.preflight.outputs.source_sha }}
          path: |
            evidence/verified-release.json
            evidence/release-candidate.json
            evidence/workbench-acceptance.json
          if-no-files-found: error
          retention-days: 90

  images:
    name: Promote accepted GHCR images
    runs-on: ubuntu-latest
    # Image bytes were already built and accepted through release-candidate.yml.
    # This job creates release aliases for those exact manifests, verifies every
    # alias resolves to the accepted digest, and writes the final BOM.
    needs: publish
    if: needs.publish.outputs.releaseReady == 'true'
    permissions:
      contents: write # publish the immutable source-SHA release BOM asset
      packages: write # publish the accepted chart and release images to GHCR
      actions: read # retrieve only the already-proven candidate artifact
    environment:
      name: production-release
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.publish.outputs.sourceSha }}
          persist-credentials: false

      - name: Set up Bun for release evidence
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Resolve image version
        id: meta
        env:
          PUBLISHED_PACKAGES: ${{ needs.publish.outputs.verifiedPackages }}
          SOURCE_SHA: ${{ needs.publish.outputs.sourceSha }}
        run: |
          # Resolve the same package-plan version frozen into the candidate
          # receipt: prefer SDK and otherwise use the first expected package.
          version="$(printf '%s' "$PUBLISHED_PACKAGES" \
            | jq -er '(map(select(.name == "@opengeni/sdk")) + sort_by(.name))[0].version')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Download and validate accepted candidate receipt
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CANDIDATE_ARTIFACT_ID: ${{ needs.publish.outputs.candidateArtifactId }}
          CANDIDATE_ARTIFACT_DIGEST: ${{ needs.publish.outputs.candidateArtifactDigest }}
          CANDIDATE_ARTIFACT_URL: ${{ needs.publish.outputs.candidateArtifactUrl }}
          CANDIDATE_SOURCE_TREE_SHA: ${{ needs.publish.outputs.candidateSourceTreeSha }}
          SOURCE_SHA: ${{ needs.publish.outputs.sourceSha }}
          EXPECTED_PACKAGES: ${{ inputs.expected_packages }}
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p evidence .release/candidate-artifact
          gh api --header 'Accept: application/vnd.github+json' \
            --output .release/candidate-artifact.zip \
            "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${CANDIDATE_ARTIFACT_ID}/zip"
          printf '%s  %s\n' "${CANDIDATE_ARTIFACT_DIGEST#sha256:}" .release/candidate-artifact.zip \
            | sha256sum --check --strict -
          unzip -q .release/candidate-artifact.zip -d .release/candidate-artifact
          candidate_path="$(find .release/candidate-artifact -type f -name release-candidate.json -print -quit)"
          test -n "$candidate_path"
          cp "$candidate_path" evidence/release-candidate.json
          chart_artifact="$(jq -er '.chart.artifact' evidence/release-candidate.json)"
          chart_path="$(find .release/candidate-artifact -type f -name "$chart_artifact" -print -quit)"
          test -n "$chart_path"
          cp "$chart_path" ".release/$chart_artifact"
          receipt_sidecar_path="$(find .release/candidate-artifact -type f -name release-candidate.sha256 -print -quit)"
          chart_sidecar_path="$(find .release/candidate-artifact -type f -name release-chart.sha256 -print -quit)"
          test -n "$receipt_sidecar_path" -a -n "$chart_sidecar_path"
          receipt_sha256="$(sha256sum evidence/release-candidate.json | awk '{print $1}')"
          [ "$(awk 'NF { print $1; exit }' "$receipt_sidecar_path")" = "$receipt_sha256" ]
          chart_sha256="$(sha256sum ".release/$chart_artifact" | awk '{print $1}')"
          [ "$(awk 'NF { print $1; exit }' "$chart_sidecar_path")" = "$chart_sha256" ]
          [ "$chart_sha256" = "$(jq -er '.chart.bytesSha256' evidence/release-candidate.json)" ]
          bun scripts/release-candidate.ts \
            --verify evidence/release-candidate.json \
            --source-sha "$SOURCE_SHA" \
            --expected-packages "$EXPECTED_PACKAGES"
          jq -e \
            --arg sourceSha "$SOURCE_SHA" \
            --arg sourceTreeSha "$CANDIDATE_SOURCE_TREE_SHA" \
            --arg releaseVersion "$RELEASE_VERSION" \
            '.sourceSha == $sourceSha and .sourceTreeSha == $sourceTreeSha and .chart.version == $releaseVersion' \
            evidence/release-candidate.json >/dev/null || {
            echo "candidate release version differs from the published package plan" >&2
            exit 1
          }

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish or reconcile the exact accepted Helm chart
        id: release-chart
        env:
          GHCR_TOKEN: ${{ github.token }}
          GHCR_USERNAME: ${{ github.actor }}
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          org="$(printf '%s' "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          echo "$GHCR_TOKEN" | helm registry login ghcr.io \
            --username "$GHCR_USERNAME" \
            --password-stdin
          chart_path=".release/opengeni-${RELEASE_VERSION}.tgz"
          expected_bytes="$(jq -er .chart.bytesSha256 evidence/release-candidate.json)"
          printf '%s  %s\n' "$expected_bytes" "$chart_path" | sha256sum --check --strict -
          rm -rf .release/chart-pull
          mkdir -p .release/chart-pull
          chart_ref="ghcr.io/${org}/charts/opengeni:${RELEASE_VERSION}"
          chart_oci="oci://ghcr.io/${org}/charts/opengeni"
          resolved_manifest="$(docker buildx imagetools inspect \
            "$chart_ref" --format '{{.Manifest.Digest}}' 2>/dev/null || true)"
          if [[ "$resolved_manifest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            helm pull "$chart_oci" \
              --version "$RELEASE_VERSION" \
              --destination .release/chart-pull
            cmp "$chart_path" ".release/chart-pull/opengeni-${RELEASE_VERSION}.tgz" || {
              echo "existing official chart bytes differ from the accepted candidate" >&2
              exit 1
            }
          else
            helm push "$chart_path" "$chart_oci"
            resolved_manifest="$(docker buildx imagetools inspect \
              "$chart_ref" --format '{{.Manifest.Digest}}')"
            [[ "$resolved_manifest" =~ ^sha256:[0-9a-f]{64}$ ]] || {
              echo "official OCI chart manifest digest was not resolved" >&2
              exit 1
            }
          fi
          rm -rf .release/chart-pull
          mkdir -p .release/chart-pull
          helm pull "oci://ghcr.io/${org}/charts/opengeni" \
            --version "$RELEASE_VERSION" \
            --destination .release/chart-pull
          cmp "$chart_path" ".release/chart-pull/opengeni-${RELEASE_VERSION}.tgz"
          chart_json="$(jq -cn \
            --arg version "$RELEASE_VERSION" \
            --arg manifestDigest "$resolved_manifest" \
            --arg bytesSha256 "$expected_bytes" \
            --arg artifact "opengeni-${RELEASE_VERSION}.tgz" \
            '{reference:"oci://ghcr.io/cloudgeni-ai/charts/opengeni",version:$version,manifestDigest:$manifestDigest,bytesSha256:$bytesSha256,artifact:$artifact}')"
          echo "manifest_digest=$resolved_manifest" >> "$GITHUB_OUTPUT"
          {
            echo 'json<<RELEASE_CHART_JSON'
            echo "$chart_json"
            echo 'RELEASE_CHART_JSON'
          } >> "$GITHUB_OUTPUT"

      # The immutable BOM is the rerun fence for moving image aliases. Exact
      # package and chart versions may already have converged idempotently, but
      # a BOM mismatch must be discovered before any moving alias is touched.
      - name: Write expected release BOM before alias mutation
        id: release-bom
        env:
          SOURCE_SHA: ${{ needs.publish.outputs.sourceSha }}
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
          BOM_PACKAGES: ${{ needs.publish.outputs.bomPackages }}
          RELEASE_CHART: ${{ steps.release-chart.outputs.json }}
        run: |
          set -euo pipefail
          images="$(jq -c '[.images | to_entries[] | .value]' evidence/release-candidate.json)"
          OPENGENI_RELEASE_BOM_SOURCE_SHA="$SOURCE_SHA" \
          OPENGENI_RELEASE_BOM_VERSION="$RELEASE_VERSION" \
          OPENGENI_RELEASE_BOM_PACKAGES="$BOM_PACKAGES" \
          OPENGENI_RELEASE_BOM_IMAGES="$images" \
          OPENGENI_RELEASE_BOM_CHART="$RELEASE_CHART" \
          bun scripts/release-bom.ts
          printf '%s  %s\n' "$(sha256sum evidence/release-bom.json | awk '{print $1}')" evidence/release-bom.json > evidence/release-bom.sha256

      - name: Compare existing immutable BOM before aliases
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ needs.publish.outputs.sourceSha }}
        run: |
          set -euo pipefail
          tag="opengeni-release-${SOURCE_SHA}"
          if gh release view "$tag" >/dev/null 2>&1; then
            resolved="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${tag}" --jq .sha)"
            [ "$resolved" = "$SOURCE_SHA" ] || {
              echo "existing BOM release tag resolves to ${resolved}, expected ${SOURCE_SHA}" >&2
              exit 1
            }
            mkdir -p /tmp/opengeni-release-bom-existing
            gh release download "$tag" \
              --dir /tmp/opengeni-release-bom-existing \
              --pattern release-bom.json \
              --pattern release-bom.sha256
            cmp evidence/release-bom.json /tmp/opengeni-release-bom-existing/release-bom.json
            cmp evidence/release-bom.sha256 /tmp/opengeni-release-bom-existing/release-bom.sha256
          fi

      - name: Promote exact accepted manifests
        env:
          SOURCE_SHA: ${{ needs.publish.outputs.sourceSha }}
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          for role in api worker web relay sandbox; do
            name="$(jq -er --arg role "$role" '.images[$role].name' evidence/release-candidate.json)"
            digest="$(jq -er --arg role "$role" '.images[$role].digest' evidence/release-candidate.json)"
            source="${name}@${digest}"
            docker buildx imagetools create \
              --prefer-index=false \
              --tag "${name}:${RELEASE_VERSION}" \
              --tag "${name}:sha-${SOURCE_SHA}" \
              --tag "${name}:latest" \
              "$source"
            for tag in "${RELEASE_VERSION}" "sha-${SOURCE_SHA}" latest; do
              promoted="$(docker buildx imagetools inspect "${name}:${tag}" --format '{{.Manifest.Digest}}')"
              [ "$promoted" = "$digest" ] || {
                echo "${name}:${tag} resolved to ${promoted}, expected accepted ${digest}" >&2
                exit 1
              }
            done
          done

      - name: Verify official images support anonymous pull
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          org="$(printf '%s' "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"

          # Remove the publishing credential before proving the documented
          # public-consumer path. Registry visibility can take a few seconds to
          # converge, so retry only the read-only manifest inspection.
          docker logout ghcr.io
          for role in api worker web relay sandbox; do
            image="ghcr.io/${org}/opengeni-${role}:${RELEASE_VERSION}"
            expected="$(jq -er --arg role "$role" '.images[$role].digest' evidence/release-candidate.json)"
            resolved=""
            for attempt in 1 2 3 4 5; do
              resolved="$(docker buildx imagetools inspect "$image" --format '{{.Manifest.Digest}}' 2>/dev/null || true)"
              [ "$resolved" = "$expected" ] && break
              sleep "$((attempt * 2))"
            done
            [ "$resolved" = "$expected" ] || {
              echo "anonymous pull proof failed for ${image}: resolved ${resolved:-nothing}, expected ${expected}" >&2
              exit 1
            }
          done
          helm registry logout ghcr.io
          mkdir -p .release/anonymous-chart
          helm pull "oci://ghcr.io/${org}/charts/opengeni" \
            --version "$RELEASE_VERSION" \
            --destination .release/anonymous-chart
          cmp ".release/opengeni-${RELEASE_VERSION}.tgz" \
            ".release/anonymous-chart/opengeni-${RELEASE_VERSION}.tgz"
          chart_digest="$(docker buildx imagetools inspect \
            "ghcr.io/${org}/charts/opengeni:${RELEASE_VERSION}" \
            --format '{{.Manifest.Digest}}')"
          expected_chart_digest="${{ steps.release-chart.outputs.manifest_digest }}"
          [ "$chart_digest" = "$expected_chart_digest" ] || {
            echo "anonymous chart manifest resolved to ${chart_digest}, expected ${expected_chart_digest}" >&2
            exit 1
          }

      - name: Upload complete release BOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-bom-${{ needs.publish.outputs.sourceSha }}
          path: |
            evidence/release-bom.json
            evidence/release-bom.sha256
          if-no-files-found: error
          retention-days: 90

      - name: Publish immutable source-SHA release BOM
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_SHA: ${{ needs.publish.outputs.sourceSha }}
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          tag="opengeni-release-${SOURCE_SHA}"
          if gh release view "$tag" >/dev/null 2>&1; then
            resolved="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${tag}" --jq .sha)"
            [ "$resolved" = "$SOURCE_SHA" ] || {
              echo "existing BOM release tag resolves to ${resolved}, expected ${SOURCE_SHA}" >&2
              exit 1
            }
            mkdir -p /tmp/opengeni-release-bom-existing
            gh release download "$tag" \
              --dir /tmp/opengeni-release-bom-existing \
              --pattern release-bom.json \
              --pattern release-bom.sha256
            cmp evidence/release-bom.json /tmp/opengeni-release-bom-existing/release-bom.json
            cmp evidence/release-bom.sha256 /tmp/opengeni-release-bom-existing/release-bom.sha256
          else
            existing_tag_sha="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${tag}" --jq .sha 2>/dev/null || true)"
            if [ -n "$existing_tag_sha" ] && [ "$existing_tag_sha" != "$SOURCE_SHA" ]; then
              echo "existing BOM tag resolves to ${existing_tag_sha}, expected ${SOURCE_SHA}" >&2
              exit 1
            fi
            gh release create "$tag" \
              evidence/release-bom.json \
              evidence/release-bom.sha256 \
              --target "$SOURCE_SHA" \
              --title "OpenGeni release BOM ${RELEASE_VERSION} (${SOURCE_SHA::12})" \
              --notes "Immutable machine-readable package and image BOM for source ${SOURCE_SHA}." \
              --latest=false
          fi
