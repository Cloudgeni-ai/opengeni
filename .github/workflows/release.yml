name: Release

# A push to main may open/update the changesets Version PR, but it can NEVER
# publish. Publication is a separate, explicit workflow_dispatch after the
# exact source revision has passed staging, production, and the production
# canary window described in docs/workbench-acceptance.md. The dispatch is bound
# to the selected git ref and records the retained acceptance evidence.
#
# The GHCR image job runs ONLY after that explicit npm publication succeeds and
# tags images from the same evidence-bound source revision. Ordinary pushes to
# main therefore neither publish packages nor rebuild/re-push release image
# tags.
#
# REQUIRED REPO/ORG SETUP. This workflow is DORMANT until activated, so it does
# not run — or red-fail — on pushes to main until you opt in:
#   1. Set the repo variable RELEASE_ENABLED=true to activate the pipeline
#      (Settings -> Secrets and variables -> Actions -> Variables).
#   2. Claim the @opengeni npm org and set the NPM_TOKEN secret to an
#      automation/granular token with publish rights (provenance via OIDC).
#   3. Enable Settings -> Actions -> General -> "Allow GitHub Actions to create
#      and approve pull requests". The scoped per-run GITHUB_TOKEN deliberately
#      authors Version PRs as github-actions[bot], leaving exact-head approval to
#      a distinct trusted human reviewer.
#   - GHCR image publishing needs no extra secret (built-in GITHUB_TOKEN) and
#     runs only when a release actually publishes.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      source_sha:
        description: Exact 40-character source SHA that passed acceptance; dispatch this workflow from that same ref.
        required: true
        type: string
      expected_packages:
        description: Exact comma-separated package set, for example @opengeni/react@0.15.0.
        required: true
        type: string
      staging_evidence_url:
        description: Retained staging acceptance/soak evidence URL for this exact SHA and image digests.
        required: true
        type: string
      production_evidence_url:
        description: Retained production promotion and immediate acceptance evidence URL.
        required: true
        type: string
      production_canary_evidence_url:
        description: Retained 72-hour zero-failure production canary evidence URL.
        required: true
        type: string
      acceptance_bundle_url:
        description: Direct HTTPS URL for the sanitized machine-readable acceptance bundle.
        required: true
        type: string
      acceptance_bundle_sha256:
        description: SHA-256 of the exact bytes downloaded from acceptance_bundle_url.
        required: true
        type: string
      confirm_zero_gaps:
        description: Confirm zero known defects, skipped checks, failed/late canary cycles, and unverified acceptance rows.
        required: true
        default: false
        type: boolean

concurrency:
  group: release-${{ github.event_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  version:
    name: Open or update Version PR
    runs-on: ubuntu-latest
    # Dormant until opted in: skips cleanly (no red) on pushes to main until the
    # repo variable RELEASE_ENABLED is set to 'true'. See the header for setup.
    if: ${{ github.event_name == 'push' && vars.RELEASE_ENABLED == 'true' }}
    permissions:
      contents: write # changesets commits package versions to its release branch
      pull-requests: write # changesets opens/updates the Version PR
      actions: write # dispatch trusted main CI for the token-authored Version PR
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ---- Version-PR gate. This job has no npm publication command. ----
      - name: Typecheck
        run: bun run typecheck

      - name: Build publishable packages
        run: bun run build:packages

      - name: SDK contract-parity test
        run: cd packages/sdk && bun test test/contract-parity.test.ts

      - name: Publish closure guard
        run: bun scripts/publish-closure-guard.ts

      - name: Runtime embedding consumer
        run: bun run test:runtime-embedding-consumer

      - name: Portable ogtool package
        run: bun run test:ogtool-package

      - name: Detect versionable changesets
        id: release_plan
        shell: bash
        run: |
          set -euo pipefail
          plan="$RUNNER_TEMP/changeset-status.json"
          bunx changeset status --output "$plan"
          changeset_count="$(jq -er '.changesets | length' "$plan")"
          release_count="$(jq -er '.releases | length' "$plan")"
          if [ "$changeset_count" -gt 0 ] && [ "$release_count" -eq 0 ]; then
            echo "::error::pending changesets target only ignored/private packages and cannot produce a Version PR"
            exit 1
          fi
          if [ "$release_count" -gt 0 ]; then
            echo "has_releases=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_releases=false" >> "$GITHUB_OUTPUT"
            echo "No publishable package changesets; a Version PR is not required."
          fi

      - name: Create or update Version PR
        id: changesets
        if: ${{ steps.release_plan.outputs.has_releases == 'true' }}
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          version: bun run changeset:version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          # Keep the automation author distinct from the trusted human reviewer.
          GITHUB_TOKEN: ${{ github.token }}

      # GITHUB_TOKEN-created pull requests intentionally do not recursively
      # trigger pull_request workflows. Dispatch the trusted CI definition from
      # main instead; its admission job binds candidate execution and checks to
      # the exact bot-authored head only after base-owned validation succeeds.
      - name: Dispatch exact-head Version PR CI
        if: ${{ steps.release_plan.outputs.has_releases == 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERSION_PR_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: node scripts/check-release-pr-automation.mjs dispatch-version-ci

  publish:
    name: Publish verified release
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && vars.RELEASE_ENABLED == 'true' }}
    permissions:
      id-token: write # npm provenance (OIDC)
      contents: write # changesets creates and pushes immutable package tags
      pull-requests: read # verify exact-head native approval before publication
    outputs:
      releaseReady: ${{ steps.registry.outputs.release_ready }}
      verifiedPackages: ${{ steps.registry.outputs.verified_packages }}
      bomPackages: ${{ steps.registry.outputs.bom_packages }}
      sourceSha: ${{ steps.preflight.outputs.source_sha }}
    steps:
      - name: Check out evidence-bound source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release identity and acceptance receipts
        id: preflight
        shell: bash
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
          STAGING_EVIDENCE_URL: ${{ inputs.staging_evidence_url }}
          PRODUCTION_EVIDENCE_URL: ${{ inputs.production_evidence_url }}
          PRODUCTION_CANARY_EVIDENCE_URL: ${{ inputs.production_canary_evidence_url }}
          ACCEPTANCE_BUNDLE_URL: ${{ inputs.acceptance_bundle_url }}
          ACCEPTANCE_BUNDLE_SHA256: ${{ inputs.acceptance_bundle_sha256 }}
          CONFIRM_ZERO_GAPS: ${{ inputs.confirm_zero_gaps }}
        run: |
          set -euo pipefail
          [[ "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "source_sha must be a 40-character lowercase git SHA" >&2
            exit 1
          }
          [ "$(git rev-parse HEAD)" = "$SOURCE_SHA" ] || {
            echo "checked-out source does not match source_sha" >&2
            exit 1
          }
          [ "$GITHUB_SHA" = "$SOURCE_SHA" ] || {
            echo "dispatch ref must resolve to source_sha; select the pinned release-candidate ref" >&2
            exit 1
          }
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$SOURCE_SHA" origin/main || {
            echo "source_sha must be reachable from origin/main" >&2
            exit 1
          }
          [ "$CONFIRM_ZERO_GAPS" = "true" ] || {
            echo "confirm_zero_gaps must be explicitly true" >&2
            exit 1
          }
          [[ "$ACCEPTANCE_BUNDLE_SHA256" =~ ^[0-9a-f]{64}$ ]] || {
            echo "acceptance_bundle_sha256 must be a lowercase SHA-256" >&2
            exit 1
          }
          [[ "$ACCEPTANCE_BUNDLE_URL" != *\?* && "$ACCEPTANCE_BUNDLE_URL" != *\#* ]] || {
            echo "acceptance_bundle_url must be a stable retained URL without a query or fragment" >&2
            exit 1
          }
          for value in \
            "$STAGING_EVIDENCE_URL" \
            "$PRODUCTION_EVIDENCE_URL" \
            "$PRODUCTION_CANARY_EVIDENCE_URL" \
            "$ACCEPTANCE_BUNDLE_URL"; do
            [[ "$value" =~ ^https://[^[:space:]]+$ ]] || {
              echo "every evidence URL must be an absolute HTTPS URL" >&2
              exit 1
            }
          done
          if find .changeset -maxdepth 1 -type f -name '*.md' ! -name README.md -print -quit | grep -q .; then
            echo "pending changesets remain; merge the generated Version PR before release acceptance" >&2
            exit 1
          fi
          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"

      - name: Verify exact-head approval provenance
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ steps.preflight.outputs.source_sha }}
        run: node scripts/check-release-pr-automation.mjs verify-approved-merge

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download and validate the complete acceptance bundle
        env:
          SOURCE_SHA: ${{ steps.preflight.outputs.source_sha }}
          STAGING_EVIDENCE_URL: ${{ inputs.staging_evidence_url }}
          PRODUCTION_EVIDENCE_URL: ${{ inputs.production_evidence_url }}
          PRODUCTION_CANARY_EVIDENCE_URL: ${{ inputs.production_canary_evidence_url }}
          ACCEPTANCE_BUNDLE_URL: ${{ inputs.acceptance_bundle_url }}
          ACCEPTANCE_BUNDLE_SHA256: ${{ inputs.acceptance_bundle_sha256 }}
        run: |
          set -euo pipefail
          mkdir -p evidence
          curl \
            --fail \
            --silent \
            --show-error \
            --proto '=https' \
            --connect-timeout 10 \
            --max-time 120 \
            --retry 2 \
            --retry-all-errors \
            --output evidence/workbench-acceptance.json \
            "$ACCEPTANCE_BUNDLE_URL"
          printf '%s  %s\n' \
            "$ACCEPTANCE_BUNDLE_SHA256" \
            evidence/workbench-acceptance.json \
            | sha256sum --check --strict -
          bun scripts/verify-workbench-acceptance-bundle.ts \
            --bundle evidence/workbench-acceptance.json \
            --source-sha "$SOURCE_SHA" \
            --staging-evidence-url "$STAGING_EVIDENCE_URL" \
            --production-evidence-url "$PRODUCTION_EVIDENCE_URL" \
            --production-canary-evidence-url "$PRODUCTION_CANARY_EVIDENCE_URL"

      # Re-run deterministic package gates at the exact accepted source before
      # bytes leave the repository. Live acceptance is bound above, not replaced.
      - name: Typecheck
        run: bun run typecheck

      - name: Build publishable packages
        run: bun run build:packages

      - name: SDK contract-parity test
        run: cd packages/sdk && bun test test/contract-parity.test.ts

      - name: Publish closure guard
        run: bun scripts/publish-closure-guard.ts

      - name: Runtime embedding consumer
        run: bun run test:runtime-embedding-consumer

      - name: Plan exact package publication
        id: package-plan
        env:
          OPENGENI_RELEASE_SOURCE_SHA: ${{ steps.preflight.outputs.source_sha }}
          OPENGENI_EXPECTED_PACKAGES: ${{ inputs.expected_packages }}
          OPENGENI_RELEASE_PACKAGE_PHASE: plan
          OPENGENI_RELEASE_PACKAGE_RECEIPT: evidence/release-packages-plan.json
        run: bun scripts/verify-release-packages.ts

      - name: Write pre-publication release plan
        env:
          SOURCE_SHA: ${{ steps.preflight.outputs.source_sha }}
          STAGING_EVIDENCE_URL: ${{ inputs.staging_evidence_url }}
          PRODUCTION_EVIDENCE_URL: ${{ inputs.production_evidence_url }}
          PRODUCTION_CANARY_EVIDENCE_URL: ${{ inputs.production_canary_evidence_url }}
          ACCEPTANCE_BUNDLE_URL: ${{ inputs.acceptance_bundle_url }}
          ACCEPTANCE_BUNDLE_SHA256: ${{ inputs.acceptance_bundle_sha256 }}
        run: |
          jq -n \
            --arg sourceSha "$SOURCE_SHA" \
            --arg stagingEvidenceUrl "$STAGING_EVIDENCE_URL" \
            --arg productionEvidenceUrl "$PRODUCTION_EVIDENCE_URL" \
            --arg productionCanaryEvidenceUrl "$PRODUCTION_CANARY_EVIDENCE_URL" \
            --arg acceptanceBundleUrl "$ACCEPTANCE_BUNDLE_URL" \
            --arg acceptanceBundleSha256 "$ACCEPTANCE_BUNDLE_SHA256" \
            --slurpfile packagePlan evidence/release-packages-plan.json \
            '{
              schemaVersion: 1,
              sourceSha: $sourceSha,
              acceptance: {
                stagingEvidenceUrl: $stagingEvidenceUrl,
                productionEvidenceUrl: $productionEvidenceUrl,
                productionCanaryEvidenceUrl: $productionCanaryEvidenceUrl,
                bundleUrl: $acceptanceBundleUrl,
                bundleSha256: $acceptanceBundleSha256,
                zeroKnownDefectsAndGapsConfirmed: true
              },
              packagePlan: $packagePlan[0]
            }' > evidence/verified-release-plan.json

      # Persist the intended destructive boundary before npm can be mutated. A
      # later dispatch can reconcile an interrupted publish by gitHead+integrity.
      - name: Upload pre-publication release plan
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: verified-release-plan-${{ steps.preflight.outputs.source_sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            evidence/verified-release-plan.json
            evidence/workbench-acceptance.json
          if-no-files-found: error
          retention-days: 90

      - name: Set up Node for npm publish
        if: steps.package-plan.outputs.needs_publish == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish evidence-bound packages
        if: steps.package-plan.outputs.needs_publish == 'true'
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          version: bun run changeset:version
          publish: bun run release:publish
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Reconcile registry package identity
        id: registry
        env:
          OPENGENI_RELEASE_SOURCE_SHA: ${{ steps.preflight.outputs.source_sha }}
          OPENGENI_EXPECTED_PACKAGES: ${{ inputs.expected_packages }}
          OPENGENI_RELEASE_PACKAGE_PHASE: verify
          OPENGENI_RELEASE_PACKAGE_RECEIPT: evidence/release-packages-verified.json
        run: bun scripts/verify-release-packages.ts

      - name: Write verified release receipt
        env:
          VERIFIED_PACKAGES: ${{ steps.registry.outputs.verified_packages }}
          BOM_PACKAGES: ${{ steps.registry.outputs.bom_packages }}
          SOURCE_SHA: ${{ steps.preflight.outputs.source_sha }}
          STAGING_EVIDENCE_URL: ${{ inputs.staging_evidence_url }}
          PRODUCTION_EVIDENCE_URL: ${{ inputs.production_evidence_url }}
          PRODUCTION_CANARY_EVIDENCE_URL: ${{ inputs.production_canary_evidence_url }}
          ACCEPTANCE_BUNDLE_URL: ${{ inputs.acceptance_bundle_url }}
          ACCEPTANCE_BUNDLE_SHA256: ${{ inputs.acceptance_bundle_sha256 }}
        run: |
          set -euo pipefail
          mkdir -p evidence
          jq -e 'type == "array" and length > 0 and all(.[]; .state == "published" and (.integrity | startswith("sha512-")))' \
            <<<"$VERIFIED_PACKAGES" >/dev/null
          jq -e 'type == "array" and length > 0 and all(.[]; .state == "published" and (.integrity | startswith("sha512-")))' \
            <<<"$BOM_PACKAGES" >/dev/null
          jq -n \
            --arg sourceSha "$SOURCE_SHA" \
            --arg stagingEvidenceUrl "$STAGING_EVIDENCE_URL" \
            --arg productionEvidenceUrl "$PRODUCTION_EVIDENCE_URL" \
            --arg productionCanaryEvidenceUrl "$PRODUCTION_CANARY_EVIDENCE_URL" \
            --arg acceptanceBundleUrl "$ACCEPTANCE_BUNDLE_URL" \
            --arg acceptanceBundleSha256 "$ACCEPTANCE_BUNDLE_SHA256" \
            --argjson publishedPackages "$VERIFIED_PACKAGES" \
            --argjson bomPackages "$BOM_PACKAGES" \
            '{
              schemaVersion: 1,
              sourceSha: $sourceSha,
              acceptance: {
                stagingEvidenceUrl: $stagingEvidenceUrl,
                productionEvidenceUrl: $productionEvidenceUrl,
                productionCanaryEvidenceUrl: $productionCanaryEvidenceUrl,
                bundleUrl: $acceptanceBundleUrl,
                bundleSha256: $acceptanceBundleSha256,
                zeroKnownDefectsAndGapsConfirmed: true
              },
              publishedPackages: $publishedPackages,
              bomPackages: $bomPackages
            }' > evidence/verified-release.json

      - name: Upload verified release receipt
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: verified-release-receipt-${{ steps.preflight.outputs.source_sha }}
          path: evidence/verified-release.json
          if-no-files-found: error
          retention-days: 90

  images:
    name: Build and push GHCR images
    runs-on: ubuntu-latest
    # GHCR publishing is the self-host load-bearing piece. It runs ONLY after the
    # evidence-bound manual release job actually publishes new npm versions, so
    # ordinary pushes and Version-PR merges never re-push image tags or latest.
    # Registry identity is reconciled by gitHead+integrity, making an interrupted
    # publish safely resumable without accepting a colliding package version.
    needs: publish
    if: needs.publish.outputs.releaseReady == 'true'
    permissions:
      contents: write # publish the immutable source-SHA release BOM asset
      packages: write # publish the accepted chart and release images to GHCR
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.publish.outputs.sourceSha }}
          persist-credentials: false

      - name: Set up Bun for release evidence
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Resolve image version
        id: meta
        env:
          PUBLISHED_PACKAGES: ${{ needs.publish.outputs.verifiedPackages }}
          SOURCE_SHA: ${{ needs.publish.outputs.sourceSha }}
        run: |
          # Tag images with the PUBLISHED release version, not the Chart.yaml
          # appVersion. The sdk + react packages are version-linked, so any of
          # the published @opengeni/* versions identifies this release; prefer
          # @opengeni/sdk and fall back to the first published package. Only if
          # the action did not report a version do we fall back to appVersion.
          version="$(printf '%s' "$PUBLISHED_PACKAGES" \
            | jq -r '(map(select(.name == "@opengeni/sdk")) + .)[0].version // empty')"
          if [ -z "${version}" ]; then
            version="$(grep -E '^appVersion:' deploy/helm/opengeni/Chart.yaml | sed -E 's/appVersion:[[:space:]]*"?([^"]+)"?/\1/')"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "sha=${SOURCE_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push Helm chart
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          org="$(printf '%s' "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          echo "$GHCR_TOKEN" | helm registry login ghcr.io \
            --username "$GHCR_USERNAME" \
            --password-stdin
          mkdir -p .release/charts
          helm package deploy/helm/opengeni \
            --destination .release/charts \
            --version "$RELEASE_VERSION" \
            --app-version "$RELEASE_VERSION"
          helm push ".release/charts/opengeni-${RELEASE_VERSION}.tgz" "oci://ghcr.io/${org}/charts"

      # "The agent ships inside the control-plane": compile + SIGN the per-SHA agent
      # binaries and stage them into agent/install/baked/ BEFORE the API image build,
      # so they ride into the image via the Dockerfile's existing `COPY . .` and the
      # API serves them from /agent/* (apps/api/src/routes/install.ts). Signing
      # happens HERE so the minisign key never enters the Docker build; an absent key
      # fails the bake loud (no unverifiable binary ships). GitHub Releases stays the
      # public archive + self-update + install.sh fallback.
      - name: Install the Rust toolchain
        run: |
          rustup toolchain install 1.97.1 --profile minimal --no-self-update
          rustup default 1.97.1

      - name: Bake + sign the per-SHA agent binaries
        env:
          OPENGENI_AGENT_MINISIGN_KEY: ${{ secrets.OPENGENI_AGENT_MINISIGN_KEY }}
        run: scripts/bake-agent.sh

      - name: Build and push API image
        id: build-api
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/opengeni.Dockerfile
          target: api
          platforms: linux/amd64
          push: true
          build-args: |
            OPENGENI_SERVER_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ghcr.io/cloudgeni-ai/opengeni-api:${{ steps.meta.outputs.version }}
            ghcr.io/cloudgeni-ai/opengeni-api:sha-${{ steps.meta.outputs.sha }}
            ghcr.io/cloudgeni-ai/opengeni-api:latest

      - name: Build and push worker image
        id: build-worker
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/opengeni.Dockerfile
          target: worker
          platforms: linux/amd64
          push: true
          build-args: |
            OPENGENI_SERVER_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ghcr.io/cloudgeni-ai/opengeni-worker:${{ steps.meta.outputs.version }}
            ghcr.io/cloudgeni-ai/opengeni-worker:sha-${{ steps.meta.outputs.sha }}
            ghcr.io/cloudgeni-ai/opengeni-worker:latest

      - name: Build and push web image
        id: build-web
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/opengeni.Dockerfile
          target: web
          platforms: linux/amd64
          push: true
          build-args: |
            OPENGENI_DEPLOYMENT_REVISION=${{ steps.meta.outputs.version }}
            OPENGENI_SERVER_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ghcr.io/cloudgeni-ai/opengeni-web:${{ steps.meta.outputs.version }}
            ghcr.io/cloudgeni-ai/opengeni-web:sha-${{ steps.meta.outputs.sha }}
            ghcr.io/cloudgeni-ai/opengeni-web:latest

      - name: Build and push headless sandbox image
        id: build-sandbox
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/sandbox.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/cloudgeni-ai/opengeni-sandbox:${{ steps.meta.outputs.version }}
            ghcr.io/cloudgeni-ai/opengeni-sandbox:sha-${{ steps.meta.outputs.sha }}
            ghcr.io/cloudgeni-ai/opengeni-sandbox:latest

      # The bring-your-own-compute stream relay. A single-stage
      # distroless image built from the Rust agent workspace — its build context is
      # agent/ (NOT the repo root) because the relay shares the agent-stream codec
      # and the Dockerfile COPYs the whole `agent/` Cargo workspace. The digest is
      # surfaced as a step output so the deploy workflow can pin the relay by digest
      # (the ops-repo deploy passes it as the `relay_digest` input).
      - name: Build and push relay image
        id: build-relay
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: agent
          file: agent/crates/opengeni-relay/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/cloudgeni-ai/opengeni-relay:${{ steps.meta.outputs.version }}
            ghcr.io/cloudgeni-ai/opengeni-relay:sha-${{ steps.meta.outputs.sha }}
            ghcr.io/cloudgeni-ai/opengeni-relay:latest

      - name: Surface relay image digest
        env:
          RELAY_IMAGE_DIGEST: ${{ steps.build-relay.outputs.digest }}
        run: echo "relay image digest = $RELAY_IMAGE_DIGEST"

      - name: Write complete release BOM
        id: release-bom
        env:
          SOURCE_SHA: ${{ needs.publish.outputs.sourceSha }}
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
          BOM_PACKAGES: ${{ needs.publish.outputs.bomPackages }}
          API_IMAGE_DIGEST: ${{ steps.build-api.outputs.digest }}
          WORKER_IMAGE_DIGEST: ${{ steps.build-worker.outputs.digest }}
          WEB_IMAGE_DIGEST: ${{ steps.build-web.outputs.digest }}
          SANDBOX_IMAGE_DIGEST: ${{ steps.build-sandbox.outputs.digest }}
          RELAY_IMAGE_DIGEST: ${{ steps.build-relay.outputs.digest }}
        run: |
          set -euo pipefail
          images="$(jq -cn \
            --arg api "$API_IMAGE_DIGEST" \
            --arg worker "$WORKER_IMAGE_DIGEST" \
            --arg web "$WEB_IMAGE_DIGEST" \
            --arg sandbox "$SANDBOX_IMAGE_DIGEST" \
            --arg relay "$RELAY_IMAGE_DIGEST" \
            '[
              {name:"ghcr.io/cloudgeni-ai/opengeni-api",digest:$api},
              {name:"ghcr.io/cloudgeni-ai/opengeni-worker",digest:$worker},
              {name:"ghcr.io/cloudgeni-ai/opengeni-web",digest:$web},
              {name:"ghcr.io/cloudgeni-ai/opengeni-sandbox",digest:$sandbox},
              {name:"ghcr.io/cloudgeni-ai/opengeni-relay",digest:$relay}
            ]')"
          OPENGENI_RELEASE_BOM_SOURCE_SHA="$SOURCE_SHA" \
          OPENGENI_RELEASE_BOM_VERSION="$RELEASE_VERSION" \
          OPENGENI_RELEASE_BOM_PACKAGES="$BOM_PACKAGES" \
          OPENGENI_RELEASE_BOM_IMAGES="$images" \
          bun scripts/release-bom.ts

      - name: Write release BOM checksum
        env:
          BOM_SHA256: ${{ steps.release-bom.outputs.sha256 }}
        run: printf '%s  %s\n' "$BOM_SHA256" release-bom.json > evidence/release-bom.sha256

      - name: Upload complete release BOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-bom-${{ needs.publish.outputs.sourceSha }}
          path: |
            evidence/release-bom.json
            evidence/release-bom.sha256
          if-no-files-found: error
          retention-days: 90

      - name: Publish immutable source-SHA release BOM
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_SHA: ${{ needs.publish.outputs.sourceSha }}
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          tag="opengeni-release-${SOURCE_SHA}"
          if gh release view "$tag" >/dev/null 2>&1; then
            resolved="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${tag}" --jq .sha)"
            [ "$resolved" = "$SOURCE_SHA" ] || {
              echo "existing BOM release tag resolves to ${resolved}, expected ${SOURCE_SHA}" >&2
              exit 1
            }
            mkdir -p /tmp/opengeni-release-bom-existing
            gh release download "$tag" \
              --dir /tmp/opengeni-release-bom-existing \
              --pattern release-bom.json \
              --pattern release-bom.sha256
            cmp evidence/release-bom.json /tmp/opengeni-release-bom-existing/release-bom.json
            cmp evidence/release-bom.sha256 /tmp/opengeni-release-bom-existing/release-bom.sha256
          else
            gh release create "$tag" \
              evidence/release-bom.json \
              evidence/release-bom.sha256 \
              --target "$SOURCE_SHA" \
              --title "OpenGeni release BOM ${RELEASE_VERSION} (${SOURCE_SHA::12})" \
              --notes "Immutable machine-readable package and image BOM for source ${SOURCE_SHA}." \
              --latest=false
          fi
