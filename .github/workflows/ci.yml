name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Typecheck and unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Test
        env:
          # OPE-26's per-subject FORCE-RLS/OCC suite is a required security gate.
          # Never turn a missing Docker/PostgreSQL runner into green skipped tests.
          OPENGENI_REQUIRE_REAL_DB: "1"
        run: bun test

      - name: React warning-free test gate
        run: bun run test:react:clean

      - name: Install pinned Playwright Chromium runtime
        run: bunx playwright install --with-deps chromium

      - name: OPE-26 session pin browser acceptance
        env:
          # This browser gate must fail when its real PostgreSQL boundary is unavailable.
          OPENGENI_REQUIRE_REAL_DB: "1"
        run: bun test --max-concurrency=1 --timeout 180000 ./test/e2e/session-pins.browser.e2e.ts

      - name: OPE-20 durable waits browser acceptance
        env:
          # Durable UI acceptance must traverse real FORCE-RLS PostgreSQL state.
          OPENGENI_REQUIRE_REAL_DB: "1"
        run: bun test --max-concurrency=1 --timeout 180000 ./test/e2e/durable-waits.browser.e2e.ts

      - name: Workbench browser acceptance
        run: bun test --max-concurrency=1 --timeout 180000 ./test/e2e/workbench.browser.e2e.ts

      - name: Upload OPE-26 visual evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ope26-session-pin-visual-evidence
          if-no-files-found: error
          retention-days: 14
          path: |
            /tmp/ope26-session-pin-desktop-light.png
            /tmp/ope26-session-pin-desktop-dark.png
            /tmp/ope26-session-pin-mobile-light.png
            /tmp/ope26-session-pin-mobile-dark.png

      - name: Upload OPE-20 durable waits visual evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ope20-durable-waits-visual-evidence
          if-no-files-found: error
          retention-days: 14
          path: |
            /tmp/ope20-durable-desktop-light.png
            /tmp/ope20-durable-desktop-dark.png
            /tmp/ope20-durable-mobile-light.png
            /tmp/ope20-durable-mobile-dark.png

      - name: Upload workbench visual evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: workbench-visual-evidence
          if-no-files-found: error
          retention-days: 14
          path: |
            /tmp/workbench-mobile-dark-dense.png
            /tmp/workbench-tablet-light-offline.png
            /tmp/workbench-desktop-dark-changes.png
            /tmp/workbench-desktop-light-files.png

      # OPE-22's escaped MCP timeout and stale-input-token regressions cross the
      # activity/DB/event boundary. Keep both explicit incident gates so a future
      # suite split cannot silently drop either the exactly-once/active-goal proof
      # or the real-Postgres shrink proof.
      - name: OPE-22 recovery integration regressions
        run: |
          bun test --timeout 30000 \
            --test-name-pattern \
            'an MCP stream timeout after a successful tool output checkpoints once and recovers the same turn' \
            ./test/integration/worker-activity.integration.ts
          bun test --timeout 180000 \
            --test-name-pattern \
            'forced overflow compaction proves shrink against active history, not stale input tokens' \
            ./apps/worker/test/context-compaction-activity.test.ts

      - name: Workspace auth/billing static guard
        run: bun scripts/check-workspace-billing-static.ts

      - name: Docs reference freshness guard
        run: bun scripts/check-docs-refs.ts

      - name: Build client packages (contracts + SDK + React)
        run: bun run build:packages

      - name: Publish closure guard
        run: bun scripts/publish-closure-guard.ts

      - name: Build React demo harness
        run: cd packages/react && bun run demo:build

      - name: Web bundle budget
        run: bun run --cwd apps/web build

  deployment:
    name: Deployment artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Validate deployment profiles
        run: |
          bun run deployment:profiles
          bun run deployment:preflight -- --profile azure-existing-services --json
          bun run deployment:preflight -- --profile azure-managed --json
          bun run deployment:preflight -- --profile aws-existing-services --json
          bun run deployment:preflight -- --profile aws-managed --json
          bun run deployment:preflight -- --profile gcp-existing-services --json
          bun run deployment:preflight -- --profile gcp-managed --json
          bun run deployment:preflight -- --profile preview-pr --json
          bun run deployment:preflight -- --profile preview-branch --json

      - name: Validate Helm chart
        run: |
          ! grep -R -nE '(:|tag:[[:space:]]*"?)latest($|")' docker-compose.yml deploy/helm/opengeni
          helm lint deploy/helm/opengeni
          helm template opengeni deploy/helm/opengeni \
            --namespace opengeni \
            --set nats.enabled=true \
            --set secret.create=true \
            --set secret.stringData.OPENGENI_DATABASE_URL=postgres://placeholder \
            --set secret.stringData.OPENGENI_TEMPORAL_HOST=temporal:7233 \
            --set secret.stringData.OPENGENI_OPENAI_API_KEY=placeholder \
            --set secret.stringData.OPENGENI_OBJECT_STORAGE_ENDPOINT=http://minio:9000 \
            >/tmp/opengeni-rendered.yaml
          helm template opengeni-digest deploy/helm/opengeni \
            --namespace opengeni \
            --set global.imageRegistry=registry.example.com \
            --set api.image.tag=ci \
            --set api.image.digest=sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa \
            --set worker.image.tag=ci \
            --set worker.image.digest=sha256:bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb \
            --set web.image.tag=ci \
            --set web.image.digest=sha256:cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc \
            --set migrations.image.tag=ci \
            --set migrations.image.digest=sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa \
            >/tmp/opengeni-digest-rendered.yaml
          helm template opengeni-azure deploy/helm/opengeni \
            --namespace opengeni \
            -f deploy/helm/opengeni/values.azure-managed.example.yaml \
            >/tmp/opengeni-azure-rendered.yaml
          helm template opengeni-azure-existing deploy/helm/opengeni \
            --namespace opengeni \
            -f deploy/helm/opengeni/values.azure-existing-services.example.yaml \
            >/tmp/opengeni-azure-existing-rendered.yaml
          helm template opengeni-aws deploy/helm/opengeni \
            --namespace opengeni \
            -f deploy/helm/opengeni/values.aws-managed.example.yaml \
            >/tmp/opengeni-aws-rendered.yaml
          helm template opengeni-gcp deploy/helm/opengeni \
            --namespace opengeni \
            -f deploy/helm/opengeni/values.gcp-managed.example.yaml \
            >/tmp/opengeni-gcp-rendered.yaml

      - name: Validate Terraform
        run: |
          terraform -chdir=deploy/terraform/azure fmt -check
          terraform -chdir=deploy/terraform/azure init -backend=false
          terraform -chdir=deploy/terraform/azure validate
          terraform -chdir=deploy/terraform/aws fmt -check
          terraform -chdir=deploy/terraform/aws init -backend=false
          terraform -chdir=deploy/terraform/aws validate
          terraform -chdir=deploy/terraform/gcp fmt -check
          terraform -chdir=deploy/terraform/gcp init -backend=false
          terraform -chdir=deploy/terraform/gcp validate

  images:
    name: Workload image builds
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: docker/opengeni.Dockerfile
          target: api
          platforms: linux/amd64
          push: false
          tags: opengeni-api:ci

      - name: Build worker image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: docker/opengeni.Dockerfile
          target: worker
          platforms: linux/amd64
          push: false
          tags: opengeni-worker:ci

      - name: Build web image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: docker/opengeni.Dockerfile
          target: web
          platforms: linux/amd64
          push: false
          tags: opengeni-web:ci
