name: Release acceptance producer

# Canonical workflow path: .github/workflows/release-acceptance.yml

# This is the canonical, operator-controlled producer identity consumed by
# release.yml. It is intentionally fail-closed until the deployment owner has
# installed the real acceptance harness on the protected environment. A
# workflow-dispatch input can select a source and candidate run, but it cannot
# supply evidence URLs, hashes, workflow paths, or repository identities.

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: Exact source SHA deployed to staging and production.
        required: true
        type: string
      candidate_run_id:
        description: Canonical release-candidate workflow run that produced this source.
        required: true
        type: string
      operator_run_id:
        description: Protected operator workflow run that produced the complete sanitized acceptance input.
        required: true
        type: string

concurrency:
  group: release-acceptance-${{ inputs.source_sha }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  acceptance:
    name: Produce trusted workbench acceptance bundle
    runs-on: ubuntu-latest
    if: ${{ vars.RELEASE_ACCEPTANCE_ENABLED == 'true' }}
    environment:
      name: production-acceptance
    permissions:
      contents: read
      actions: read
    steps:
      - name: Check out the exact accepted source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate source identity
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          case "$GITHUB_WORKFLOW_REF" in
            "$GITHUB_REPOSITORY/.github/workflows/release-acceptance.yml@"*) ;;
            *)
              echo "unexpected acceptance workflow identity: $GITHUB_WORKFLOW_REF" >&2
              exit 1
              ;;
          esac
          [[ "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]] || exit 1
          [ "$(git rev-parse HEAD)" = "$SOURCE_SHA" ] || exit 1
          [ "$GITHUB_SHA" = "$SOURCE_SHA" ] || exit 1
          git fetch --no-tags origin main
          [ "$(git rev-parse origin/main)" = "$SOURCE_SHA" ] || exit 1

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Verify the candidate producer before acceptance
        id: candidate
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
        run: |
          set -euo pipefail
          mkdir -p evidence
          bun scripts/verify-release-provenance.ts \
            --kind candidate \
            --source-sha "$SOURCE_SHA" \
            --run-id "$CANDIDATE_RUN_ID" \
            --output evidence/candidate-provenance.json \
            --output-prefix candidate

      - name: Verify the protected operator acceptance producer
        id: operator
        env:
          OPERATOR_GITHUB_TOKEN: ${{ secrets.RELEASE_ACCEPTANCE_OPERATOR_TOKEN }}
          OPERATOR_REPOSITORY: ${{ vars.RELEASE_ACCEPTANCE_OPERATOR_REPOSITORY }}
          OPERATOR_WORKFLOW_PATH: ${{ vars.RELEASE_ACCEPTANCE_OPERATOR_WORKFLOW_PATH }}
          OPERATOR_RUN_ID: ${{ inputs.operator_run_id }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          bun scripts/verify-operator-acceptance-provenance.ts \
            --repository "$OPERATOR_REPOSITORY" \
            --workflow-path "$OPERATOR_WORKFLOW_PATH" \
            --source-sha "$SOURCE_SHA" \
            --run-id "$OPERATOR_RUN_ID" \
            --output evidence/operator-provenance.json

      - name: Download the exact candidate receipt
        env:
          GH_TOKEN: ${{ github.token }}
          CANDIDATE_ARTIFACT_ID: ${{ steps.candidate.outputs.candidate_artifact_id }}
          CANDIDATE_ARTIFACT_DIGEST: ${{ steps.candidate.outputs.candidate_artifact_digest }}
        run: |
          set -euo pipefail
          mkdir -p .release/candidate
          zip=".release/candidate/artifact.zip"
          gh api \
            --header 'Accept: application/vnd.github+json' \
            --output "$zip" \
            "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${CANDIDATE_ARTIFACT_ID}/zip"
          printf '%s  %s\n' "${CANDIDATE_ARTIFACT_DIGEST#sha256:}" "$zip" \
            | sha256sum --check --strict -
          mapfile -t receipts < <(unzip -Z1 "$zip" | grep -E '(^|/)release-candidate\.json$')
          mapfile -t sidecars < <(unzip -Z1 "$zip" | grep -E '(^|/)release-candidate\.sha256$')
          test "${#receipts[@]}" -eq 1 -a "${#sidecars[@]}" -eq 1
          unzip -p "$zip" "${receipts[0]}" > evidence/release-candidate.json
          unzip -p "$zip" "${sidecars[0]}" > evidence/release-candidate.sha256
          receipt_sha="$(sha256sum evidence/release-candidate.json | awk '{print $1}')"
          test "$receipt_sha" = "$(awk 'NF { print $1; exit }' evidence/release-candidate.sha256)"
          echo "CANDIDATE_RECEIPT_SHA256=$receipt_sha" >> "$GITHUB_ENV"

      - name: Download the exact sanitized operator bundle
        env:
          GH_TOKEN: ${{ secrets.RELEASE_ACCEPTANCE_OPERATOR_TOKEN }}
          OPERATOR_REPOSITORY: ${{ steps.operator.outputs.repository }}
          OPERATOR_ARTIFACT_ID: ${{ steps.operator.outputs.artifact_id }}
          OPERATOR_ARTIFACT_DIGEST: ${{ steps.operator.outputs.artifact_digest }}
        run: |
          set -euo pipefail
          mkdir -p .release/operator
          zip=".release/operator/artifact.zip"
          gh api \
            --header 'Accept: application/vnd.github+json' \
            --output "$zip" \
            "/repos/${OPERATOR_REPOSITORY}/actions/artifacts/${OPERATOR_ARTIFACT_ID}/zip"
          printf '%s  %s\n' "${OPERATOR_ARTIFACT_DIGEST#sha256:}" "$zip" \
            | sha256sum --check --strict -
          mapfile -t entries < <(unzip -Z1 "$zip" | sort)
          expected=(
            "workbench-acceptance.json"
            "workbench-acceptance.sha256"
          )
          test "${#entries[@]}" -eq "${#expected[@]}"
          for index in "${!expected[@]}"; do
            test "${entries[$index]}" = "${expected[$index]}"
          done
          unzip -p "$zip" workbench-acceptance.json \
            > .release/operator/workbench-acceptance.json
          unzip -p "$zip" workbench-acceptance.sha256 \
            > .release/operator/workbench-acceptance.sha256
          operator_sha="$(sha256sum .release/operator/workbench-acceptance.json | awk '{print $1}')"
          test "$operator_sha" = "$(awk 'NF { print $1; exit }' .release/operator/workbench-acceptance.sha256)"

      - name: Assemble and validate the canonical acceptance bundle
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          bun scripts/assemble-release-acceptance.ts \
            --operator-bundle .release/operator/workbench-acceptance.json \
            --candidate-receipt evidence/release-candidate.json \
            --candidate-provenance evidence/candidate-provenance.json \
            --candidate-receipt-sha256 "$CANDIDATE_RECEIPT_SHA256" \
            --source-sha "$SOURCE_SHA" \
            --acceptance-run-id "$GITHUB_RUN_ID" \
            --acceptance-run-attempt "$GITHUB_RUN_ATTEMPT" \
            --output evidence/workbench-acceptance.json \
            --sha-output evidence/workbench-acceptance.sha256

      - name: Upload the complete acceptance artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-acceptance-${{ inputs.source_sha }}
          path: |
            evidence/workbench-acceptance.json
            evidence/workbench-acceptance.sha256
          if-no-files-found: error
          retention-days: 90
