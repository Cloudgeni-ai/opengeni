name: Preview Deploy

# Preview-deploy ACTUATOR for the sandbox-surfacing giga-PR (09-gigapr-delivery.md
# §C). Decoupled from the changesets release gate (release.yml publishes images ONLY
# on a Version-PR merge, never per-branch). This workflow, on manual dispatch, builds
# + pushes FOUR GHCR images at :sha-<sha> (api/worker/web + the desktop sandbox image)
# and `helm upgrade --install`s the preview-managed profile, then runs the live
# deployment preflight.
#
# DESKTOP IN PREVIEW ONLY. The deploy step flips OPENGENI_SANDBOX_OWNERSHIP_ENABLED
# and OPENGENI_SANDBOX_DESKTOP_ENABLED ON via --set config.* — these stay OFF by
# default in the merged code (and in every other environment). The desktop image is
# NOT a 4th Kubernetes deployment: it is a Modal sandbox image pulled by the
# worker/api at box-create time, selected purely by OPENGENI_MODAL_IMAGE_REF in the
# opengeni-runtime secret (set to the :sha-<sha> tag this run builds). See deploy/PREVIEW.md.
#
# DORMANT UNTIL PROVISIONED. The deploy job is gated on a `preview` GitHub
# Environment carrying a KUBECONFIG secret + a `host` input. With neither present it
# no-ops cleanly with a "preview not provisioned" message (not a hard failure), so
# this workflow is mergeable and inert until Jørgen wires the env. See deploy/PREVIEW.md
# §"What the operator must provision" and 09-gigapr-delivery.md §E.

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: "Kubernetes namespace to deploy into."
        required: false
        default: "opengeni-preview-branch"
      host:
        description: "Ingress hostname for the preview (e.g. preview.opengeni.dev). Leave blank to build images only / no-op the deploy."
        required: false
        default: ""
      ref:
        description: "Git ref (branch/tag/sha) to build + deploy."
        required: false
        default: "claude/naughty-engelbart-2d3b09"

concurrency:
  group: preview-${{ github.event.inputs.namespace }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build and push 4 GHCR images (incl. desktop)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Resolve image tag
        id: meta
        run: echo "sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- api / worker / web: the 3 multi-stage targets (copied from release.yml). ---
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/opengeni.Dockerfile
          target: api
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/cloudgeni-ai/opengeni-api:sha-${{ steps.meta.outputs.sha }}
            ghcr.io/cloudgeni-ai/opengeni-api:preview

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/opengeni.Dockerfile
          target: worker
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/cloudgeni-ai/opengeni-worker:sha-${{ steps.meta.outputs.sha }}
            ghcr.io/cloudgeni-ai/opengeni-worker:preview

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/opengeni.Dockerfile
          target: web
          platforms: linux/amd64
          push: true
          build-args: |
            OPENGENI_DEPLOYMENT_REVISION=sha-${{ steps.meta.outputs.sha }}
          tags: |
            ghcr.io/cloudgeni-ai/opengeni-web:sha-${{ steps.meta.outputs.sha }}
            ghcr.io/cloudgeni-ai/opengeni-web:preview

      # --- desktop: SINGLE-STAGE (no `target`) -> the Modal sandbox image. ---
      # This is NOT a k8s deployment image. Modal pulls it at box-create time when
      # OPENGENI_MODAL_IMAGE_REF points at this tag (set in the opengeni-runtime secret).
      - name: Build and push desktop sandbox image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/desktop.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/cloudgeni-ai/opengeni-desktop-sandbox:sha-${{ steps.meta.outputs.sha }}
            ghcr.io/cloudgeni-ai/opengeni-desktop-sandbox:preview

  deploy:
    name: Helm upgrade + live preflight
    runs-on: ubuntu-latest
    needs: build-and-push
    # The `preview` GitHub Environment is where the KUBECONFIG secret lives. The job
    # still RUNS when the environment is empty — the gate below no-ops it cleanly.
    environment: preview
    permissions:
      contents: read
    env:
      SHA: ${{ needs.build-and-push.outputs.sha }}
      NAMESPACE: ${{ github.event.inputs.namespace }}
      HOST: ${{ github.event.inputs.host }}
      KUBECONFIG_B64: ${{ secrets.KUBECONFIG }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref }}

      # DORMANT GATE: with no KUBECONFIG secret or no `host` input, deploy is a clean
      # no-op (not a red failure), so the workflow is mergeable + inert until wired.
      - name: Gate on provisioned preview env
        id: gate
        run: |
          if [ -z "${KUBECONFIG_B64}" ] || [ -z "${HOST}" ]; then
            echo "preview not provisioned: need both a 'preview' Environment KUBECONFIG secret and a 'host' input." >&2
            echo "  KUBECONFIG secret present: $([ -n "${KUBECONFIG_B64}" ] && echo yes || echo no)" >&2
            echo "  host input present:        $([ -n "${HOST}" ] && echo yes || echo no)" >&2
            echo "  See deploy/PREVIEW.md for the one-time provisioning runbook. Skipping deploy (images were still built + pushed)." >&2
            echo "provisioned=false" >> "$GITHUB_OUTPUT"
          else
            echo "provisioned=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Bun
        if: steps.gate.outputs.provisioned == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        if: steps.gate.outputs.provisioned == 'true'
        run: bun install --frozen-lockfile

      - name: Set up Helm
        if: steps.gate.outputs.provisioned == 'true'
        uses: azure/setup-helm@v5

      - name: Write kubeconfig
        if: steps.gate.outputs.provisioned == 'true'
        run: |
          mkdir -p "$HOME/.kube"
          # The KUBECONFIG secret is the base64-encoded kubeconfig for a namespaced
          # ServiceAccount (NOT cluster-admin). See deploy/PREVIEW.md.
          printf '%s' "${KUBECONFIG_B64}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"

      - name: Helm upgrade --install (preview-managed profile)
        if: steps.gate.outputs.provisioned == 'true'
        run: |
          helm upgrade --install opengeni-preview deploy/helm/opengeni \
            -n "${NAMESPACE}" --create-namespace \
            -f deploy/helm/opengeni/values.preview-managed.example.yaml \
            --set global.imageRegistry=ghcr.io/cloudgeni-ai \
            --set api.image.tag="sha-${SHA}" \
            --set worker.image.tag="sha-${SHA}" \
            --set web.image.tag="sha-${SHA}" \
            --set migrations.image.tag="sha-${SHA}" \
            --set ingress.hosts[0].host="${HOST}" \
            --set "ingress.tls[0].hosts[0]=${HOST}" \
            --set "ingress.tls[0].secretName=opengeni-preview-tls" \
            --set "config.OPENGENI_PUBLIC_BASE_URL=https://${HOST}" \
            --set "minio.publicEndpoint=https://${HOST}" \
            --set "config.OPENGENI_SANDBOX_OWNERSHIP_ENABLED=true" \
            --set "config.OPENGENI_SANDBOX_DESKTOP_ENABLED=true" \
            --set "config.OPENGENI_COMPUTER_USE_ENABLED=true" \
            --set "config.OPENGENI_RECORDING_ENABLED=true" \
            --wait --timeout 15m
          # NOTE: the desktop is selected by OPENGENI_MODAL_IMAGE_REF in the
          # opengeni-runtime secret (= ghcr.io/cloudgeni-ai/opengeni-desktop-sandbox:sha-${SHA}),
          # NOT a chart deployment. The operator sets that secret (deploy/PREVIEW.md).

      - name: Live deployment preflight (--profile preview-branch --live)
        if: steps.gate.outputs.provisioned == 'true'
        run: bun scripts/deployment-preflight.ts --profile preview-branch --live
