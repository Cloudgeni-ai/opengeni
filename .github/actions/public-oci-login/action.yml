name: Public OCI registry login
description: Validate and authenticate the configured public release registry.

inputs:
  oci-prefix:
    description: Registry host plus optional repository namespace.
    required: true
  auth:
    description: Authentication mode: github or azure-oidc.
    required: true
  github-username:
    description: GitHub registry username when auth is github.
    required: false
  github-token:
    description: GitHub registry token when auth is github.
    required: false
  azure-client-id:
    description: Azure workload identity client ID when auth is azure-oidc.
    required: false
  azure-tenant-id:
    description: Azure tenant ID when auth is azure-oidc.
    required: false
  azure-subscription-id:
    description: Azure subscription ID when auth is azure-oidc.
    required: false

outputs:
  registry:
    description: Canonical registry host.
    value: ${{ steps.registry.outputs.registry }}

runs:
  using: composite
  steps:
    - name: Validate registry authority
      id: registry
      shell: bash
      env:
        OPENGENI_RELEASE_OCI_PREFIX: ${{ inputs.oci-prefix }}
        OPENGENI_RELEASE_REGISTRY_AUTH: ${{ inputs.auth }}
        AZURE_CLIENT_ID: ${{ inputs.azure-client-id }}
        AZURE_TENANT_ID: ${{ inputs.azure-tenant-id }}
        AZURE_SUBSCRIPTION_ID: ${{ inputs.azure-subscription-id }}
      run: |
        set -euo pipefail
        identity="$(bun scripts/release-registry.ts)"
        registry="$(jq -er .registry <<<"$identity")"
        case "$OPENGENI_RELEASE_REGISTRY_AUTH" in
          github)
            [ "$registry" = "ghcr.io" ] || {
              echo "github registry auth is valid only for ghcr.io" >&2
              exit 1
            }
            ;;
          azure-oidc)
            [[ "$registry" =~ ^[a-z0-9][a-z0-9.-]*\.azurecr\.io$ ]] || {
              echo "azure-oidc registry auth requires an Azure Container Registry host" >&2
              exit 1
            }
            [ -n "$AZURE_CLIENT_ID" ] && [ -n "$AZURE_TENANT_ID" ] && [ -n "$AZURE_SUBSCRIPTION_ID" ] || {
              echo "azure-oidc registry auth requires the three Azure OIDC authority variables" >&2
              exit 1
            }
            ;;
          *)
            echo "unsupported OPENGENI_RELEASE_REGISTRY_AUTH: $OPENGENI_RELEASE_REGISTRY_AUTH" >&2
            exit 1
            ;;
        esac
        echo "registry=$registry" >> "$GITHUB_OUTPUT"

    - name: Log in to Azure through GitHub OIDC
      if: inputs.auth == 'azure-oidc'
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
      with:
        client-id: ${{ inputs.azure-client-id }}
        tenant-id: ${{ inputs.azure-tenant-id }}
        subscription-id: ${{ inputs.azure-subscription-id }}

    - name: Mint a bounded Azure registry credential
      if: inputs.auth == 'azure-oidc'
      id: azure-registry
      uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3.0.0
      env:
        REGISTRY: ${{ steps.registry.outputs.registry }}
      with:
        azcliversion: 2.88.0
        inlineScript: |
          set -euo pipefail
          actual_version="$(az version --query '"azure-cli"' -o tsv)"
          [ "$actual_version" = "2.88.0" ] || {
            echo "Azure CLI version drifted to ${actual_version}" >&2
            exit 1
          }
          token="$(az acr login \
            --name "${REGISTRY%%.azurecr.io}" \
            --expose-token \
            --output tsv \
            --query accessToken)"
          [ -n "$token" ]
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

    - name: Log in to the Azure registry for Docker
      if: inputs.auth == 'azure-oidc'
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: ${{ steps.registry.outputs.registry }}
        username: 00000000-0000-0000-0000-000000000000
        password: ${{ steps.azure-registry.outputs.token }}

    - name: Log in to the Azure registry for Helm
      if: inputs.auth == 'azure-oidc'
      shell: bash
      env:
        REGISTRY: ${{ steps.registry.outputs.registry }}
        REGISTRY_TOKEN: ${{ steps.azure-registry.outputs.token }}
      run: |
        set -euo pipefail
        printf '%s' "$REGISTRY_TOKEN" | helm registry login "$REGISTRY" \
          --username 00000000-0000-0000-0000-000000000000 \
          --password-stdin

    - name: Log in to GHCR for Docker
      if: inputs.auth == 'github'
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: ghcr.io
        username: ${{ inputs.github-username }}
        password: ${{ inputs.github-token }}

    - name: Log in to GHCR for Helm
      if: inputs.auth == 'github'
      shell: bash
      env:
        GHCR_USERNAME: ${{ inputs.github-username }}
        GHCR_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        printf '%s' "$GHCR_TOKEN" | helm registry login ghcr.io \
          --username "$GHCR_USERNAME" \
          --password-stdin
