[project]
name = "cloud-agent-platform"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "aiosqlite>=0.21.0,<0.22",
    "alembic>=1.18.4,<2",
    "asyncpg>=0.31.0,<0.32",
    "cloud-agent-contracts",
    "modal>=1.4.2,<2",
    "openai-agents[sqlalchemy]>=0.14.1,<0.15",
    "opentelemetry-sdk>=1.39.0,<2",
    "pydantic-settings>=2.13.1,<3",
    "sqlalchemy>=2.0.49,<3",
    "temporalio>=1.26.0,<2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cloud_agent_platform"]

[tool.uv.sources]
cloud-agent-contracts = { workspace = true }

